<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bass Scale Practice</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <main class="app">
    <section class="topbar" aria-label="Controls">
      <div class="title">
        <h1 id="title">Loading…</h1>
        <p id="subtitle"></p>
      </div>
      <button class="btn">◀ Prev</button>
      <div class="chip" id="shape-label">Shape 1</div>
      <button class="btn">Next ▶</button>
      <button class="btn play" id="play-btn">▶ Play</button>
      <div class="pattern-toggle" role="group" aria-label="Playback pattern">
        <button class="btn pattern-btn active" data-pattern="ascending"  aria-pressed="true">Ascending</button>
        <button class="btn pattern-btn"        data-pattern="descending" aria-pressed="false">Descending</button>
        <button class="btn pattern-btn"        data-pattern="both"       aria-pressed="false">Both</button>
      </div>
    </section>

    <section class="board-wrap">
      <svg id="fretboard" viewBox="0 0 1180 390" role="img" aria-label="Bass fretboard"></svg>
      <div id="fret-labels"></div>

      <div class="legend">
        <div class="legend-item"><span class="swatch"></span> Scale tone</div>
        <div class="legend-item"><span class="swatch open"></span> Root (C)</div>
        <div class="legend-item"><span class="swatch ghost"></span> Position marker</div>
        <div class="legend-item" style="margin-left:auto; color: var(--muted); font-size:0.92rem;">
          <label for="tempo" style="margin-right:6px;">Tempo</label>
          <input id="tempo" type="range" min="40" max="200" value="80" style="vertical-align:middle;" />
          <span id="tempo-value" style="margin-left:6px; font-weight:600;">80 BPM</span>
        </div>
        <div class="legend-item" id="active-note-label" style="font-weight:600;">—</div>
      </div>
    </section>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
